<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vaultify - Password Manager</title>
  <style>
    :root {
      --primary: #0f172a;
      --primary-hover: #334155;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --bg-color: #f8fafc;
      --surface: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #10b981;
      --radius-md: 12px;
      --radius-lg: 20px;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    /* App Container */
    .app-container {
      width: 100%;
      max-width: 480px;
      background: var(--bg-color);
      min-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
    }

    /* Header */
    header {
      background: var(--surface);
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Main Content */
    main {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      position: relative;
    }

    /* Loading & Empty States */
    .state-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 300px;
      text-align: center;
      color: var(--text-muted);
      animation: fadeIn 0.3s ease;
    }

    .state-container svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      color: var(--border);
    }

    .spinner {
      border: 3px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Password List */
    .password-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .password-card {
      background: var(--surface);
      border-radius: var(--radius-md);
      padding: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      justify-content: space-between;
      animation: fadeIn 0.3s ease;
    }

    .card-info {
      flex: 1;
      overflow: hidden;
    }

    .card-title {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-username {
      font-size: 0.875rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-left: 12px;
    }

    /* Buttons */
    .icon-btn {
      background: var(--bg-color);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: var(--transition);
    }

    .icon-btn:hover {
      background: var(--border);
      color: var(--primary);
    }

    .icon-btn.delete:hover {
      background: #fee2e2;
      color: var(--danger);
    }

    .fab {
      position: absolute;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      box-shadow: var(--shadow-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      z-index: 20;
    }

    .fab:hover {
      background: var(--accent-hover);
      transform: scale(1.05);
    }

    .btn {
      padding: 12px 24px;
      border-radius: var(--radius-md);
      border: none;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      width: 100%;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: var(--bg-color);
      color: var(--text-main);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    .btn-danger {
      background: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(4px);
      z-index: 50;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: var(--surface);
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: 24px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-lg);
    }

    .modal-overlay.active .modal-content {
      transform: translateY(0);
    }

    @media (min-width: 481px) {
      .modal-overlay {
        align-items: center;
        padding: 24px;
      }

      .modal-content {
        border-radius: var(--radius-lg);
        transform: scale(0.95);
      }

      .modal-overlay.active .modal-content {
        transform: scale(1);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-header h2 {
      font-size: 1.25rem;
      font-weight: 600;
    }

    /* Forms */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-muted);
    }

    .form-control {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--bg-color);
      font-size: 1rem;
      color: var(--text-main);
      transition: var(--transition);
      font-family: inherit;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .input-group {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-group .icon-btn {
      position: absolute;
      right: 8px;
      background: transparent;
    }

    .input-group .form-control {
      padding-right: 48px;
    }

    .gen-pwd-btn {
      display: block;
      margin-top: 8px;
      font-size: 0.875rem;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }

    /* Toasts */
    .toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
      width: 90%;
      max-width: 400px;
    }

    .toast {
      background: var(--primary);
      color: white;
      padding: 12px 20px;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 500;
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      opacity: 0;
    }

    .toast.error {
      background: var(--danger);
    }

    .toast.success {
      background: var(--success);
    }

    .toast.closing {
      animation: slideDown 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 1;
        transform: translateY(0);
      }

      to {
        opacity: 0;
        transform: translateY(20px);
      }
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>

  <div class="app-container">
    <header>
      <h1>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        Vaultify
      </h1>
    </header>

    <main id="main-content">
    </main>

    <button class="fab" id="btn-add" aria-label="Add Password">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    </button>
  </div>

  <div class="modal-overlay" id="form-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">New Password</h2>
        <button class="icon-btn" id="btn-close-form" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <form id="password-form">
        <input type="hidden" id="entry-id">
        <div class="form-group">
          <label for="site">Website or App</label>
          <input type="text" id="site" class="form-control" placeholder="e.g. Google" required>
        </div>
        <div class="form-group">
          <label for="username">Username or Email</label>
          <input type="text" id="username" class="form-control" placeholder="e.g. user@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-group">
            <input type="password" id="password" class="form-control" placeholder="Enter password" required>
            <button type="button" class="icon-btn" id="btn-toggle-pwd" tabindex="-1">
              <svg id="icon-eye" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg id="icon-eye-off" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <button type="button" class="gen-pwd-btn" id="btn-gen-pwd">Generate Secure Password</button>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top: 16px;">Save Password</button>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="confirm-modal">
    <div class="modal-content" style="max-width: 360px;">
      <div class="modal-header" style="margin-bottom: 16px;">
        <h2>Delete Password?</h2>
      </div>
      <p style="color: var(--text-muted); margin-bottom: 24px;">Are you sure you want to delete this password? This action cannot be undone.</p>
      <div style="display: flex; gap: 12px;">
        <button class="btn btn-secondary" id="btn-confirm-cancel">Cancel</button>
        <button class="btn btn-danger" id="btn-confirm-delete">Delete</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script>
    // --- State Management ---
    let vault = [];
    let deleteTargetId = null;

    // --- DOM Elements ---
    const elMain = document.getElementById('main-content');
    const elFormModal = document.getElementById('form-modal');
    const elConfirmModal = document.getElementById('confirm-modal');
    const elForm = document.getElementById('password-form');
    const elToastContainer = document.getElementById('toast-container');

    // --- Initialization ---
    function init() {
      renderLoading();
      // Simulate brief loading for UI polish
      setTimeout(() => {
        loadData();
        renderVault();
      }, 400);
    }

    function loadData() {
      try {
        const data = localStorage.getItem('vaultify_data');
        if (data) vault = JSON.parse(data);
      } catch (e) {
        showToast('Failed to load data', 'error');
      }
    }

    function saveData() {
      try {
        localStorage.setItem('vaultify_data', JSON.stringify(vault));
      } catch (e) {
        showToast('Failed to save data', 'error');
      }
    }

    // --- Rendering ---
    function renderLoading() {
      elMain.innerHTML = `
                <div class="state-container">
                    <div class="spinner"></div>
                </div>
            `;
    }

    function renderEmpty() {
      elMain.innerHTML = `
                <div class="state-container">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <h3>Your vault is empty</h3>
                    <p style="margin-top: 8px; font-size: 0.875rem;">Tap the + button to add a password.</p>
                </div>
            `;
    }

    function renderVault() {
      if (vault.length === 0) {
        renderEmpty();
        return;
      }

      const listHtml = vault.map(item => `
                <div class="password-card">
                    <div class="card-info">
                        <div class="card-title">${escapeHTML(item.site)}</div>
                        <div class="card-username">${escapeHTML(item.username)}</div>
                    </div>
                    <div class="card-actions">
                        <button class="icon-btn" onclick="copyPassword('${item.id}')" aria-label="Copy password" title="Copy Password">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        </button>
                        <button class="icon-btn delete" onclick="triggerDelete('${item.id}')" aria-label="Delete password" title="Delete">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                    </div>
                </div>
            `).join('');

      elMain.innerHTML = `<div class="password-list">${listHtml}</div>`;
    }

    // --- Core Logic ---
    function handleFormSubmit(e) {
      e.preventDefault();
      const id = document.getElementById('entry-id').value;
      const site = document.getElementById('site').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!site || !username || !password) {
        showToast('All fields are required', 'error');
        return;
      }

      if (id) {
        // Update
        const index = vault.findIndex(v => v.id === id);
        if (index > -1) {
          vault[index] = { id, site, username, password };
          showToast('Password updated successfully', 'success');
        }
      } else {
        // Create
        const newId = Date.now().toString(36) + Math.random().toString(36).substr(2);
        vault.unshift({ id: newId, site, username, password });
        showToast('Password added successfully', 'success');
      }

      saveData();
      renderVault();
      closeModal(elFormModal);
    }

    async function copyPassword(id) {
      const entry = vault.find(v => v.id === id);
      if (!entry) return;

      try {
        await navigator.clipboard.writeText(entry.password);
        showToast('Password copied to clipboard!', 'success');
      } catch (err) {
        // Fallback for older browsers
        const textArea = document.createElement("textarea");
        textArea.value = entry.password;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          showToast('Password copied to clipboard!', 'success');
        } catch (e) {
          showToast('Failed to copy password', 'error');
        }
        document.body.removeChild(textArea);
      }
    }

    function triggerDelete(id) {
      deleteTargetId = id;
      elConfirmModal.classList.add('active');
    }

    function confirmDelete() {
      if (!deleteTargetId) return;
      vault = vault.filter(v => v.id !== deleteTargetId);
      saveData();
      renderVault();
      showToast('Password deleted', 'success');
      closeModal(elConfirmModal);
      deleteTargetId = null;
    }

    function generatePassword() {
      const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+~`|}{[]:;?><,./-=";
      let pwd = "";
      const length = 16;
      const array = new Uint32Array(length);
      window.crypto.getRandomValues(array);
      for (let i = 0; i < length; i++) {
        pwd += chars[array[i] % chars.length];
      }
      document.getElementById('password').value = pwd;

      // Auto switch to text mode to see it
      const pwdInput = document.getElementById('password');
      if (pwdInput.type === 'password') togglePasswordVisibility();
    }

    // --- UI Interactions ---
    function openFormModal() {
      elForm.reset();
      document.getElementById('entry-id').value = '';
      document.getElementById('modal-title').textContent = 'New Password';

      // Ensure password is hidden by default when opening
      const pwdInput = document.getElementById('password');
      if (pwdInput.type === 'text') togglePasswordVisibility();

      elFormModal.classList.add('active');
      setTimeout(() => document.getElementById('site').focus(), 100);
    }

    function closeModal(modalEl) {
      modalEl.classList.remove('active');
    }

    function togglePasswordVisibility() {
      const input = document.getElementById('password');
      const iconEye = document.getElementById('icon-eye');
      const iconEyeOff = document.getElementById('icon-eye-off');

      if (input.type === 'password') {
        input.type = 'text';
        iconEye.classList.add('hidden');
        iconEyeOff.classList.remove('hidden');
      } else {
        input.type = 'password';
        iconEye.classList.remove('hidden');
        iconEyeOff.classList.add('hidden');
      }
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;

      const icon = type === 'success' ?
        `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>` :
        `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;

      toast.innerHTML = `${icon} <span>${message}</span>`;
      elToastContainer.appendChild(toast);

      setTimeout(() => {
        toast.classList.add('closing');
        toast.addEventListener('animationend', () => toast.remove());
      }, 3000);
    }

    // --- Utilities ---
    function escapeHTML(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // --- Event Listeners ---
    document.getElementById('btn-add').addEventListener('click', openFormModal);
    document.getElementById('btn-close-form').addEventListener('click', () => closeModal(elFormModal));
    document.getElementById('btn-confirm-cancel').addEventListener('click', () => closeModal(elConfirmModal));
    document.getElementById('btn-confirm-delete').addEventListener('click', confirmDelete);
    document.getElementById('btn-toggle-pwd').addEventListener('click', togglePasswordVisibility);
    document.getElementById('btn-gen-pwd').addEventListener('click', generatePassword);
    elForm.addEventListener('submit', handleFormSubmit);

    // Close modals on outside click
        [elFormModal, elConfirmModal].forEach(modal => {
      modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal(modal);
      });
    });

    // Start App
    init();
  </script>
</body>

</html>
